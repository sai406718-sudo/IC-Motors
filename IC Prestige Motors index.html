<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人主页 & 汽车展示</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f5f7; 
            color: #333; 
            line-height: 1.6;
        }

        /* 顶部封面与个人信息 */
        .header { position: relative; background: #fff; padding-bottom: 20px; }
        .cover { width: 100%; height: 180px; object-fit: cover; background: #4a90e2; }
        .profile-info { 
            position: relative; 
            padding: 0 16px; 
            margin-top: -40px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }
        .avatar { 
            width: 80px; 
            height: 80px; 
            border-radius: 50%; 
            border: 3px solid #fff; 
            box-shadow: 0 2px 8px rgba(0,0,0,0.1); 
        }
        .name { font-size: 20px; font-weight: bold; margin-top: 8px; }
        .bio { font-size: 14px; color: #666; margin-top: 4px; text-align: center; }

        /* 内容容器 */
        .container { max-width: 600px; margin: 16px auto; padding: 0 12px; }

        /* 卡片样式 */
        .section-title { font-size: 16px; font-weight: bold; margin: 16px 0 8px 4px; color: #555; }
        .card { 
            background: #fff; 
            border-radius: 12px; 
            overflow: hidden; 
            margin-bottom: 16px; 
            box-shadow: 0 2px 6px rgba(0,0,0,0.05); 
        }
        .card img { width: 100%; height: auto; display: block; }
        .card-body { padding: 12px 16px; }
        .card-title { font-size: 16px; font-weight: bold; margin-bottom: 6px; }
        .card-desc { font-size: 14px; color: #666; }

        /* 页脚 */
        .footer { text-align: center; padding: 20px; color: #999; font-size: 12px; }
    </style>
</head>
<body>

    <!-- 顶部个人信息 -->
    <div class="header">
        <div class="cover"></div>
        <div class="profile-info">
            <img class="avatar" src="https://picsum.photos/200" alt="头像">
            <div class="name">我的个人主页</div>
            <div class="bio">欢迎来到我的小站，这里分享我的爱车与生活。</div>
        </div>
    </div>

    <!-- 主体展示区 -->
    <div class="container">
        <div class="section-title">爱车展示</div>

        <!-- 汽车卡片 1 -->
        <div class="card">
            <img src="https://images.unsplash.com/photo-1503376780353-7e6692767b70?w=800" alt="保时捷 911">
            <div class="card-body">
                <div class="card-title">保时捷 911</div>
                <div class="card-desc">经典的跑车造型，极致的操控体验与卓越的动力表现。</div>
            </div>
        </div>

        <!-- 汽车卡片 2 -->
        <div class="card">
            <img src="https://images.unsplash.com/photo-1555215695-3004980ad54e?w=800" alt="宝马 M4">
            <div class="card-body">
                <div class="card-title">宝马 M4</div>
                <div class="card-desc">兼具日常实用性与赛道性能的运动轿跑。</div>
            </div>
        </div>
    </div>

    <div class="footer">
        © 2026 My Personal Page. Built with GitHub Pages.
    </div>

</body>
</html>
